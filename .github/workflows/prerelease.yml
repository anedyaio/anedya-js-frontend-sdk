# ─────────────────────────────────────────────────────────────────────────────
# Prerelease Workflow
#
# PURPOSE:
#   Automatically build and publish a prerelease (beta) version of the SDK
#   every time code is merged into the `prerelease` branch.
#
# TRIGGER:
#   - Push to `prerelease` branch only
#
# CHANGESETS PRERELEASE MODE EXPLAINED:
#   When `changeset pre enter beta` is run, Changesets writes a `.changeset/pre.json`
#   file that tracks which packages are in prerelease mode. Every subsequent
#   `changeset version` call will append a pre-release suffix (e.g., -beta.0,
#   -beta.1) instead of bumping the stable version.
#
#   This file MUST be committed back to the `prerelease` branch so the next
#   run knows we are already in prerelease mode. Without committing it, every
#   push would reset the counter back to -beta.0.
#
# IDEMPOTENCY:
#   The workflow checks for `.changeset/pre.json` before entering pre mode so
#   that repeated runs on an already-configured branch do not error out.
#
# NODE_AUTH_TOKEN SCOPE:
#   `actions/setup-node` writes an `.npmrc` that references NODE_AUTH_TOKEN.
#   That env var must be present at publish time, NOT at setup time. We set it
#   on the publish step directly so it is scoped correctly and not leaked.
#
# PERMISSIONS:
#   contents: write  → push version bump commits + tags back to the branch
#   id-token: write  → (future) allows npm provenance attestation
# ─────────────────────────────────────────────────────────────────────────────
name: Prerelease

on:
  push:
    branches:
      - prerelease

concurrency:
  group: prerelease-${{ github.ref }}
  cancel-in-progress: false  # Never cancel an in-progress publish run

permissions:
  contents: write
  id-token: write

jobs:
  prerelease:
    name: Prerelease · Version · Publish (beta)
    runs-on: ubuntu-latest

    steps:
      # fetch-depth: 0 is required so Changesets can read the full git history
      # to determine which packages changed and what version bumps are needed.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Sets up Node and configures an `.npmrc` that points NODE_AUTH_TOKEN to
      # the npm registry. The actual token value is injected on the publish step.
      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install Dependencies
        run: npm ci

      # The github-actions bot identity is required so that git commits pushed
      # back from this workflow (version bumps, CHANGELOG updates) have a valid
      # author. Without this, `git commit` will fail.
      - name: Configure Git Identity
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # Enter prerelease mode only once. Once `pre.json` exists and is committed
      # to the branch, all subsequent runs skip this step automatically.
      - name: Enter Prerelease Mode (if not already active)
        run: |
          if [ ! -f .changeset/pre.json ]; then
            echo "::notice::Entering Changesets prerelease mode (beta)"
            npx changeset pre enter beta
            git add .changeset/pre.json
            git commit -m "chore(release): enter prerelease mode [skip ci]"
            git push origin prerelease
          else
            echo "::notice::Already in prerelease mode — skipping pre enter"
          fi

      # `changeset version` reads pending changeset files (*.md in .changeset/)
      # and updates package.json + CHANGELOG.md accordingly. In prerelease mode,
      # it appends the -beta.N suffix and increments N on each run.
      - name: Version Packages
        run: npx changeset version

      # Only proceed with build + publish if package.json was actually modified.
      # If there are no pending changesets, Changesets does nothing and we skip
      # the expensive build + publish steps cleanly.
      - name: Check for Version Changes
        id: version_check
        run: |
          if git diff --quiet package.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No changesets found — nothing to publish"
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "changed=true"  >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "::notice::Version bumped to $VERSION"
          fi

      - name: Build SDK
        if: steps.version_check.outputs.changed == 'true'
        run: npm run build

      # Tests are disabled until test coverage lands. Re-enable when ready:
      # - name: Run Tests
      #   if: steps.version_check.outputs.changed == 'true'
      #   run: npm test

      # `changeset publish --tag beta` publishes to npm under the `beta` dist-tag.
      # This means `npm install @anedyasystems/anedya-frontend-sdk` still gets the
      # stable `latest` version, and only `npm install @anedyasystems/anedya-frontend-sdk@beta`
      # gets the prerelease.
      #
      # NODE_AUTH_TOKEN is set HERE (not on setup-node) because that is when
      # npm actually reads it. The setup-node step only writes the reference.
      - name: Publish Prerelease to npm (beta)
        if: steps.version_check.outputs.changed == 'true'
        # Do NOT pass --tag beta here. When Changesets is in pre mode, it reads
        # the tag from pre.json automatically (the tag set during `pre enter beta`).
        # Passing --tag explicitly causes: "Releasing under custom tag is not allowed in pre mode"
        run: npx changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Push the version bump commit + any tags Changesets created.
      # `--follow-tags` ensures lightweight and annotated tags travel with the commit.
      - name: Commit and Push Version Bump
        if: steps.version_check.outputs.changed == 'true'
        run: |
          git add -A
          git commit -m "chore(release): v${{ steps.version_check.outputs.version }} prerelease [skip ci]"
          git push origin prerelease --follow-tags
